<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>食品过敏原检测</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #007AFF;
            --danger: #FF3B30;
            --warning: #FF9500;
            --success: #34C759;
            --bg: #F5F5F7;
            --card: #FFFFFF;
            --text: #1C1C1E;
            --text-secondary: #8E8E93;
            --border: #E5E5EA;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .app-container {
            min-height: 100vh;
            padding-bottom: 20px;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, #5AC8FA 100%);
            color: white;
            padding: 48px 20px 32px;
            text-align: center;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.9;
        }

        .main-content {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .count {
            font-size: 16px;
            color: var(--text-secondary);
        }

        .search-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--border);
            background: transparent;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
        }

        .tab-btn.active {
            border-color: var(--primary);
            background: rgba(0,122,255,0.05);
            color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .text-input {
            flex: 1;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
        }

        .search-btn, .add-btn {
            padding: 14px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .divider {
            text-align: center;
            margin: 16px 0;
            color: var(--text-secondary);
            position: relative;
        }

        .divider::before,.divider::after {
            content:'';
            position:absolute;
            top:50%;
            width:40%;
            height:1px;
            background:var(--border);
        }

        .divider::before {left:0}
        .divider::after {right:0}

        .scan-btn {
            width:100%;
            padding:16px;
            background:var(--success);
            color:white;
            border:none;
            border-radius:12px;
            font-size:17px;
            font-weight:600;
            cursor:pointer;
        }

        .scan-btn.active {
            background:var(--danger);
        }

        .hint {
            font-size:13px;
            color:var(--text-secondary);
        }

        .scanner-container {
            margin-top:16px;
            border-radius:12px;
            overflow:hidden;
            background:#000;
            display:none;
        }

        .scanner {
            width:100%;
            height:250px;
        }

        .preset-tags {
            display:flex;
            flex-wrap:wrap;
            gap:8px;
            margin-top:8px;
        }

        .preset-tag {
            padding:8px 14px;
            background:rgba(0,122,255,0.08);
            border:1.5px solid var(--primary);
            border-radius:20px;
            font-size:14px;
            cursor:pointer;
        }

        .preset-tag.selected {
            background:var(--primary);
            color:white;
        }

        .my-allergens {
            display:flex;
            flex-wrap:wrap;
            gap:10px;
            margin-top:10px;
        }

        .allergen-tag {
            padding:10px 14px;
            background:rgba(255,59,48,0.1);
            border:1.5px solid var(--danger);
            border-radius:20px;
            font-size:15px;
            color:var(--danger);
            display:flex;
            align-items:center;
            gap:8px;
        }

        .remove-tag {
            cursor:pointer;
            font-size:18px;
        }

        .empty-state {
            color:var(--text-secondary);
            padding:10px 0;
        }

        .product-info {
            padding:16px;
            background:rgba(0,122,255,0.05);
            border-left:4px solid var(--primary);
            border-radius:8px;
            margin-bottom:16px;
        }

        .product-name {
            font-size:18px;
            font-weight:600;
            color:var(--primary);
        }

        .result-status {
            padding:16px;
            border-radius:12px;
            display:flex;
            align-items:center;
            gap:12px;
            margin-bottom:16px;
        }

        .result-status.safe {
            background:rgba(52,199,89,0.1);
            border:2px solid var(--success);
        }

        .result-status.warning {
            background:rgba(255,59,48,0.1);
            border:2px solid var(--danger);
        }

        .result-icon {
            font-size:28px;
        }

        .ingredients-list {
            display:flex;
            flex-wrap:wrap;
            gap:8px;
        }

        .ingredient {
            padding:6px 10px;
            background:#fff;
            border-radius:6px;
            font-size:14px;
        }

        .ingredient.danger {
            background:rgba(255,59,48,0.15);
            color:var(--danger);
            font-weight:bold;
        }

        .loading-overlay {
            position:fixed;
            top:0;left:0;right:0;bottom:0;
            background:rgba(0,0,0,0.5);
            display:flex;
            align-items:center;
            justify-content:center;
            z-index:999;
            display:none;
        }

        .spinner {
            width:40px;
            height:40px;
            border:4px solid rgba(255,255,255,0.3);
            border-top-color:white;
            border-radius:50%;
            animation:spin 0.8s linear infinite;
        }

        @keyframes spin {to{transform:rotate(360deg)}}

        .toast {
            position:fixed;
            bottom:30px;
            left:50%;
            transform:translateX(-50%);
            background:rgba(0,0,0,0.8);
            color:white;
            padding:10px 20px;
            border-radius:20px;
            z-index:999;
        }

        .barcode-validation {
            font-size:13px;
            margin-top:4px;
            display:none;
        }

        .barcode-validation.valid {color:var(--success);display:block}
        .barcode-validation.invalid {color:var(--danger);display:block}
    </style>
</head>
<body>

<div class="app-container">
    <header class="header">
        <h1 class="title">食品过敏原检测</h1>
        <p class="subtitle">扫码/输入条码，一键查询</p>
    </header>

    <main class="main-content">
        <section class="card">
            <h2 class="section-title">查询食品</h2>
            <div class="search-tabs">
                <button class="tab-btn active" data-target="barcode-tab">条码查询</button>
                <button class="tab-btn" data-target="name-tab">商品名查询</button>
            </div>

            <div id="barcode-tab" class="tab-content active">
                <div class="input-group">
                    <input class="text-input" id="barcode" placeholder="输入条形码" oninput="checkBarcode()">
                    <button class="search-btn" onclick="search()">查询</button>
                </div>
                <div id="barcode-info" class="barcode-validation"></div>
            </div>

            <div id="name-tab" class="tab-content">
                <div class="input-group">
                    <input class="text-input" id="pname" placeholder="输入商品名">
                    <button class="search-btn" onclick="searchName()">查询</button>
                </div>
            </div>
        </section>

        <section class="card">
            <h2 class="section-title">我的过敏原 <span id="acount">(0)</span></h2>
            <div class="input-group">
                <input class="text-input" id="ainput" placeholder="添加过敏原">
                <button class="add-btn" onclick="addA()">添加</button>
            </div>
            <div class="preset-tags" id="preset"></div>
            <div class="my-allergens" id="alist"></div>
        </section>

        <section class="card" id="result" style="display:none">
            <h2 class="section-title">检测结果</h2>
            <div id="pinfo"></div>
            <div id="checkResult"></div>
        </section>
    </main>
</div>

<div class="loading-overlay" id="loading">
    <div class="spinner"></div>
</div>

<script>
// 内置本地商品库（无跨域、100%能运行）
const localProducts = {
  "3017620422003": {name:"Nutella 榛子酱",brand:"Ferrero",ingredients:"糖、棕榈油、榛子（13%）、低脂可可粉、牛奶、乳清、卵磷脂"},
  "690123456789": {name:"荞麦挂面",brand:"香雪",ingredients:"小麦粉、荞麦粉、食用盐、水"},
  "692220011234": {name:"花生牛奶",brand:"旺旺",ingredients:"生牛乳、花生、白砂糖、食品添加剂"}
};

const defaultAllergens = ["荞麦","花生","牛奶","乳糖","海鲜","虾","鸡蛋","大豆","小麦","芒果"];
let myAllergens = JSON.parse(localStorage.getItem("myAllergens")) || [];

// 初始化
document.addEventListener("DOMContentLoaded",()=>{
  initTabs();
  renderAllergens();
  renderPreset();
});

// 标签切换
function initTabs(){
  document.querySelectorAll(".tab-btn").forEach(btn=>{
    btn.onclick = ()=>{
      document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
      document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById(btn.dataset.target).classList.add("active");
    }
  })
}

// 渲染过敏原
function renderAllergens(){
  const list = document.getElementById("alist");
  document.getElementById("acount").innerText = `(${myAllergens.length})`;
  if(myAllergens.length===0){
    list.innerHTML = `<div class="empty-state">请添加你的过敏原</div>`;
    return;
  }
  list.innerHTML = myAllergens.map(a=>`
    <div class="allergen-tag">${a} <span class="remove-tag" onclick="delA('${a}')">×</span></div>
  `).join("");
}

// 快速添加
function renderPreset(){
  const box = document.getElementById("preset");
  box.innerHTML = defaultAllergens.map(a=>`
    <span class="preset-tag ${myAllergens.includes(a)?'selected':''}" onclick="toggleA('${a}')">${a}</span>
  `).join("");
}

// 切换过敏原
function toggleA(name){
  if(myAllergens.includes(name)){
    myAllergens = myAllergens.filter(x=>x!==name);
  }else{
    myAllergens.push(name);
  }
  save();
  renderAllergens();
  renderPreset();
}

// 添加
function addA(){
  const v = document.getElementById("ainput").value.trim();
  if(!v)return toast("请输入内容");
  if(!myAllergens.includes(v)) myAllergens.push(v);
  save();
  renderAllergens();
  renderPreset();
  document.getElementById("ainput").value="";
}

// 删除
function delA(name){
  myAllergens = myAllergens.filter(x=>x!==name);
  save();
  renderAllergens();
  renderPreset();
}

function save(){
  localStorage.setItem("myAllergens",JSON.stringify(myAllergens));
}

// 条码校验
function checkBarcode(){
  const v = document.getElementById("barcode").value.trim();
  const info = document.getElementById("barcode-info");
  if(v.length<8||v.length>14){
    info.innerText = "✗ 条码长度应为8-14位";
    info.className = "barcode-validation invalid";
  }else{
    info.innerText = "✓ 条码格式正确";
    info.className = "barcode-validation valid";
  }
}

// 查询（本地版，无跨域，100%可用）
function search(){
  const code = document.getElementById("barcode").value.trim();
  if(!code)return toast("请输入条码");
  if(myAllergens.length===0)return toast("请先添加过敏原");
  showLoading();

  setTimeout(()=>{
    const p = localProducts[code];
    if(!p){
      toast("暂无此商品数据");
      hideLoading();
      return;
    }
    showResult(p);
    hideLoading();
  },600);
}

// 名称查询
function searchName(){
  const kw = document.getElementById("pname").value.trim().toLowerCase();
  if(!kw)return toast("请输入商品名");
  if(myAllergens.length===0)return toast("请先添加过敏原");
  showLoading();

  setTimeout(()=>{
    let found = null;
    for(let c in localProducts){
      const p = localProducts[c];
      if(p.name.toLowerCase().includes(kw)){found=p;break}
    }
    if(!found){toast("未找到商品");hideLoading();return}
    showResult(found);
    hideLoading();
  },600);
}

// 展示结果
function showResult(p){
  document.getElementById("result").style.display = "block";
  document.getElementById("pinfo").innerHTML = `
    <div class="product-info">
      <div class="product-name">${p.name}</div>
      <div>品牌：${p.brand||"无"}</div>
      <div>配料：${p.ingredients}</div>
    </div>
  `;

  const ings = p.ingredients.split(/、|,/).map(i=>i.trim());
  const dangers = myAllergens.filter(a=>
    ings.some(i=>i.includes(a)||a.includes(i))
  );

  const safe = dangers.length===0;
  document.getElementById("checkResult").innerHTML = `
    <div class="result-status ${safe?'safe':'warning'}">
      <span class="result-icon">${safe?"✅":"⚠️"}</span>
      <div>
        <div>${safe?"可以食用":"含有过敏原"}</div>
        <div style="font-size:14px">${safe?"未检测到过敏原":"危险成分："+dangers.join("、")}</div>
      </div>
    </div>
    <div class="ingredients-list">
      ${ings.map(i=>`
        <span class="ingredient ${dangers.some(d=>i.includes(d))?'danger':''}">${i}</span>
      `).join("")}
    </div>
  `;
}

function toast(msg){
  const t = document.createElement("div");
  t.className="toast";
  t.innerText=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2000);
}

function showLoading(){document.getElementById("loading").style.display="flex"}
function hideLoading(){document.getElementById("loading").style.display="none"}
</script>
</body>
</html>
